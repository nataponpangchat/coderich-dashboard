function renderKpis(){const quote=DATA.metrics.find(m=>m.key==='quote'),so=DATA.metrics.find(m=>m.key==='so'),rev=DATA.metrics.find(m=>m.key==='revenue'),gp=DATA.grossProfit,docs=DATA.docs||{};const cards=[[text('revenue'),money(rev.actualYtd),`${text('target')} ${money(rev.targetYtd)} \u00b7 ${metricLine(rev)}`,'performance'],[text('so'),money(so.actualYtd),`${text('target')} ${money(so.targetYtd)} \u00b7 ${metricLine(so)}`,'performance'],[text('quote'),money(quote.actualYtd),`${text('target')} ${money(quote.targetYtd)} \u00b7 ${metricLine(quote)}`,'performance'],[text('gp'),money(gp.actualYtd),`${text('target')} ${money(gp.targetYtd)}`,'performance'],[text('projectOngoing'),money(DATA.status.ongoingTotal),`${text('received')} ${money(DATA.status.received)}`,'status'],[text('remaining'),money(DATA.status.remaining),`${text('profitEst')} ${money(DATA.status.profitEst)}`,'status'],[text('tenderTotal'),money(DATA.status.proposalTotal),`${text('won')} ${money(DATA.status.wonTotal)}`,'status'],['Win Rate',pct(DATA.status.winRate),`${text('byJobs')} ${pct(DATA.status.winRateJob)}`,'status']];const colors=['#C8A55A','#2E67C8','#0F2D52','#16815D','#153A65','#B88931','#486F9E','#C8A55A'];kpis.innerHTML=cards.map((c,i)=>{const link=docs[c[3]]?`<a class="source-link" href="${docs[c[3]]}" target="_blank" rel="noopener">${text('database')}</a>`:'';return `<div class="card kpi" style="--accent:${colors[i]}"><div><div class="label">${c[0]}</div><div class="value">${c[1]}</div></div><div><div class="delta">${c[2]}</div>${link}</div></div>`}).join('')}
function drawTrend(){const canvas=trend,ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);const pad=48,w=canvas.width-pad*2,h=canvas.height-pad*2,rev=DATA.metrics.find(m=>m.key==='revenue'),vals=[...rev.target,...rev.actual].filter(v=>v>=0),max=Math.max(...vals,1)*1.18;ctx.strokeStyle='#DCE4EC';ctx.font='13px Arial';ctx.fillStyle='#67798D';for(let i=0;i<5;i++){const y=pad+h-(h*i/4);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(pad+w,y);ctx.stroke()}function plot(arr,color){ctx.strokeStyle=color;ctx.lineWidth=3;ctx.beginPath();arr.forEach((v,i)=>{const x=pad+i*w/11,y=pad+h-(Math.max(v,0)/max*h);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();arr.forEach((v,i)=>{const x=pad+i*w/11,y=pad+h-(Math.max(v,0)/max*h);ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill()})}plot(rev.target,'#9AA8B4');plot(rev.actual,'#C8A55A');DATA.months.forEach((m,i)=>ctx.fillText(m,pad+i*w/11-10,pad+h+25));ctx.fillStyle='#9AA8B4';ctx.fillRect(pad,16,14,4);ctx.fillText('Target',pad+20,21);ctx.fillStyle='#C8A55A';ctx.fillRect(pad+94,16,14,4);ctx.fillText('Actual',pad+114,21)}
function drawDonut(){const c=donut,ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);const items=[['Received',DATA.status.received,'#0F2D52'],['Remaining',DATA.status.remaining,'#C8A55A'],['Profit',DATA.status.profitEst,'#2E67C8']],total=items.reduce((s,i)=>s+i[1],0)||1;let start=-Math.PI/2;const cx=150,cy=154,r=94;items.forEach(i=>{const a=i[1]/total*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+a);ctx.closePath();ctx.fillStyle=i[2];ctx.fill();start+=a});ctx.beginPath();ctx.arc(cx,cy,58,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();ctx.fillStyle='#0F2D52';ctx.font='800 23px Arial';ctx.textAlign='center';ctx.fillText(pct(DATA.status.winRate),cx,150);ctx.font='13px Arial';ctx.fillStyle='#67798D';ctx.fillText('Win Rate',cx,171);ctx.textAlign='left';items.forEach((i,idx)=>{const y=98+idx*36;ctx.fillStyle=i[2];ctx.fillRect(292,y-10,12,12);ctx.fillStyle='#102033';ctx.fillText(i[0],312,y);ctx.fillStyle='#67798D';ctx.fillText(money(i[1]),312,y+17)});miniWin.textContent=money(DATA.status.wonTotal);miniReceived.textContent=money(DATA.status.received);miniRemain.textContent=money(DATA.status.remaining)}
function renderTables(){projectsTable.innerHTML=`<tr><th>${text('project')}</th><th class="money">${text('value')}</th><th class="money">${text('billed')}</th><th class="money">${text('revenue')}</th><th class="money">${text('remaining')}</th></tr>`+DATA.projects.map(p=>`<tr><td>${p.name}<br><span class="pill">${p.status}</span></td><td class="money">${money(p.value)}</td><td class="money">${money(p.billed)}</td><td class="money">${money(p.revenue)}</td><td class="money">${money(p.remaining)}</td></tr>`).join('');const max=Math.max(...DATA.ownerCounts.map(x=>x.count),1);ownerBars.innerHTML=DATA.ownerCounts.map(x=>`<div class="bar-row"><div>${x.step}</div><div class="track"><div class="fill" style="width:${x.count/max*100}%"></div></div><b>${x.count}</b></div>`).join('');strategyList.innerHTML=DATA.strategyItems.map(x=>`<div class="strategy-item"><span>${x.text}</span><span class="pill">${x.status}</span></div>`).join('');clientsTable.innerHTML=`<tr><th>${text('customer')}</th><th>${text('progress')}</th></tr>`+DATA.clients.map(c=>`<tr><td>${c.client}</td><td><span class="pill">${c.done}/${c.total}</span></td></tr>`).join('')}
function renderMapping(){const perf=DATA.mapping?.performance||{};const rows=Object.keys(perf).map(k=>[k,perf[k].source||'',perf[k].note||'']);mappingTable.innerHTML=`<tr><th>${text('metric')}</th><th>${text('source')}</th><th>${text('note')}</th></tr>`+rows.map(r=>`<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')}
function render(){initTheme();initText();initNav();updated.textContent=DATA.generatedAt;renderKpis();drawTrend();drawDonut();renderTables();renderMapping()}refresh.onclick=()=>{updated.textContent=new Date().toLocaleString('th-TH')};render();
</script></body></html>
